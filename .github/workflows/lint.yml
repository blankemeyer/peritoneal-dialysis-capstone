on: pull_request

jobs:
  clang-format:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        path: [src, lib, include, test]
    steps:
      - uses: actions/checkout@v6
      - uses: jidicula/clang-format-action@v4.16.0
        with:
          clang-format-version: 21
          check-path: ${{ matrix.path }}
